name: CPX integration

on:
  pull_request:
    paths:
      - 'app/**/cpx/**'
      - 'app/api/cpx/**'
      - 'components/cpx/**'
      - 'lib/cpx/**'
      - 'services/cpx/**'
      - 'supabase/migrations/00022_cpx_sessions.sql'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/cpx-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**/cpx/**'
      - 'app/api/cpx/**'
      - 'components/cpx/**'
      - 'lib/cpx/**'
      - 'services/cpx/**'
      - 'supabase/migrations/00022_cpx_sessions.sql'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/cpx-ci.yml'

permissions:
  contents: read

jobs:
  lecturelink:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run cpx:bundle-check
      - run: node --check scripts/test-cpx-deployment.mjs

  patient-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cpx/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: services/cpx/server/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py evaluate.py scoring.py prompt.py physical_exam.py db.py
      - run: python test_scoring.py
      - run: python test_all_cases.py
      - run: python test_all_cases_api.py
      - run: python test_lecturelink_auth.py
      - run: python test_prompt_context.py
